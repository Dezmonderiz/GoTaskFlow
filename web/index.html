<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GoTaskFlow</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app">
    <header class="page-header">
      <div>
        <h1>GoTaskFlow</h1>
        <p>Mini Task Tracker</p>
      </div>
      <button class="secondary-button" id="refreshButton" type="button">Обновить</button>
    </header>

    <section class="stats" aria-label="Статистика задач">
      <div>
        <span class="stats-label">Всего</span>
        <strong id="statsTotal">0</strong>
      </div>
      <div>
        <span class="stats-label">Todo</span>
        <strong id="statsTodo">0</strong>
      </div>
      <div>
        <span class="stats-label">В работе</span>
        <strong id="statsInProgress">0</strong>
      </div>
      <div>
        <span class="stats-label">Готово</span>
        <strong id="statsDone">0</strong>
      </div>
    </section>

    <section class="task-form-section" aria-labelledby="createTaskTitle">
      <h2 id="createTaskTitle">Новая задача</h2>
      <form class="task-form" id="taskForm">
        <label>
          Название
          <input id="taskTitle" name="title" type="text" maxlength="255" required>
        </label>
        <label>
          Описание
          <textarea id="taskDescription" name="description" rows="3"></textarea>
        </label>
        <button type="submit">Создать</button>
      </form>
      <p class="message" id="message" role="status"></p>
    </section>

    <section class="task-list-section" aria-labelledby="tasksTitle">
      <h2 id="tasksTitle">Задачи</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Название</th>
              <th>Описание</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="tasksTableBody">
            <tr>
              <td colspan="4" class="empty-state">Загрузка задач...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gotaskflow_app
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@db:5432/gotaskflow?sslmode=disable # pragma: allowlist secret
      REDIS_ADDR: cache:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      STATS_CACHE_TTL_SECONDS: 60
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - gotaskflow_network

  migrate:
    image: migrate/migrate:v4.18.3
    container_name: gotaskflow_migrate
    volumes:
      - ./migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@db:5432/gotaskflow?sslmode=disable # pragma: allowlist secret
      - up
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gotaskflow_network

  db:
    image: postgres:17-alpine
    container_name: gotaskflow_postgres
    environment:
      POSTGRES_DB: gotaskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # pragma: allowlist secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gotaskflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gotaskflow_network

  cache:
    image: redis:7-alpine
    container_name: gotaskflow_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gotaskflow_network

volumes:
  postgres_data:

networks:
  gotaskflow_network:
    driver: bridge

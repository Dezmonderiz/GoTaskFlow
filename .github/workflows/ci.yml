name: CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: .pre-commit-config.yaml

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      - name: Install dependencies
        run: go mod download

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run pre-commit checks
        env:
          SKIP: gofmt,go-vet,go-test
        run: pre-commit run --all-files

      - name: Run gofmt check
        run: |
          test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

  tests:
    name: Tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - ./internal/service
          - ./internal/handler

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run package tests
        run: go test -cover ${{ matrix.package }}

  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
          cache-dependency-path: go.sum

      - name: Build application
        run: go build -buildvcs=false -v ./cmd/app

  security-sast:
    name: SAST (gosec)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
          cache-dependency-path: go.sum

      - name: Cache gosec binary
        uses: actions/cache@v4
        with:
          path: ~/go/bin/gosec
          key: ${{ runner.os }}-gosec-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-gosec-

      - name: Install gosec if missing
        run: |
          GOBIN="$(go env GOPATH)/bin"
          echo "$GOBIN" >> "$GITHUB_PATH"
          if [ ! -x "$GOBIN/gosec" ]; then
            go install github.com/securego/gosec/v2/cmd/gosec@latest
          fi

      - name: Run gosec
        run: gosec -fmt json -out gosec-report.json ./...

      - name: Upload gosec artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: gosec-report.json

  security-sca:
    name: SCA (govulncheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
          cache-dependency-path: go.sum

      - name: Cache govulncheck binary
        uses: actions/cache@v4
        with:
          path: ~/go/bin/govulncheck
          key: ${{ runner.os }}-govulncheck-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-govulncheck-

      - name: Install govulncheck if missing
        run: |
          GOBIN="$(go env GOPATH)/bin"
          echo "$GOBIN" >> "$GITHUB_PATH"
          if [ ! -x "$GOBIN/govulncheck" ]; then
            go install golang.org/x/vuln/cmd/govulncheck@latest
          fi

      - name: Run govulncheck
        run: govulncheck ./...

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - security-sast
      - security-sca

    steps:
      - name: Check security status
        run: |
          if [ "${{ needs.security-sast.result }}" != "success" ] || [ "${{ needs.security-sca.result }}" != "success" ]; then
            echo "Security checks failed"
            exit 1
          fi
          echo "Security checks passed"

  docker:
    name: Docker Build and Optional Push
    runs-on: ubuntu-latest
    needs:
      - quality
      - tests
      - build
      - security-gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/dezmonderiz/gotaskflow:latest
            ghcr.io/dezmonderiz/gotaskflow:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
